<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="theme-color" content="#0a0a0a"/>
<title>Home Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #0a0a0a; height: 100%; font-family: 'Outfit', sans-serif; color: #e8e8e8; }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: #1e1e1e; border-radius: 99px; }

  #app {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 3fr 1fr;
  }

  #left {
    padding: 36px 32px;
    border-right: 1px solid #111;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  #right {
    padding: 36px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0d0d0d;
    position: sticky;
    top: 0;
    height: 100vh;
  }

  /* ── CLOCK ── */
  #clock-day {
    font-family: 'Cormorant Garamond', serif;
    font-size: 52px; font-weight: 300; color: #ffffff;
    line-height: 1; letter-spacing: -1px;
  }
  #clock-date { font-size: 14px; font-weight: 400; color: #888; margin-top: 4px; letter-spacing: 0.5px; }
  #clock-time { font-size: 13px; font-weight: 400; color: #555; margin-top: 3px; letter-spacing: 2px; }
  #clock-time span { font-size: 13px; color: #444; margin-left: 2px; letter-spacing: 1px; }
  #sync-status { font-size: 9px; color: #1e1e1e; letter-spacing: 1.5px; margin-top: 4px; transition: color 0.4s; }
  #sync-status.syncing { color: #fb923c; }
  #sync-status.ok      { color: #1e1e1e; }
  #sync-status.error   { color: #3a3a3a; }

  /* ── NAV TABS ── */
  #nav {
    display: flex; gap: 20px; margin-bottom: 28px;
  }
  .nav-btn {
    background: none; border: none; cursor: pointer;
    font-family: 'Outfit', sans-serif; font-size: 10px;
    font-weight: 600; letter-spacing: 2.5px; color: #2a2a2a;
    padding: 0; transition: color 0.2s;
  }
  .nav-btn.active { color: #ffffff; }
  .nav-btn:hover:not(.active) { color: #555; }

  /* ── SECTION HEADER ── */
  .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; margin-top: 4px; }
  .section-pip { width: 3px; height: 12px; border-radius: 99px; opacity: 0.7; }
  .section-label { font-size: 10px; font-weight: 600; color: #555; letter-spacing: 2.5px; }
  .section-count { font-size: 11px; color: #444; margin-left: auto; }

  /* ── TASK ROW ── */
  .task-row {
    display: flex; align-items: center; gap: 13px;
    padding: 11px 14px; border-radius: 11px; cursor: pointer;
    margin-bottom: 5px;
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.05);
    transition: all 0.15s; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .task-row:active { transform: scale(0.99); background: rgba(255,255,255,0.04); }
  .task-row.done { background: rgba(74,222,128,0.04); border-color: rgba(74,222,128,0.12); }
  .task-row.readonly { cursor: default; }
  .task-row.readonly:active { transform: none; }
  .task-checkbox {
    width: 20px; height: 20px; border-radius: 6px; flex-shrink: 0;
    border: 1.5px solid #252525; background: transparent;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .task-row.done .task-checkbox { border-color: #4ade80; background: #4ade80; }
  .task-checkbox svg { display: none; }
  .task-row.done .task-checkbox svg { display: block; }
  .task-emoji { font-size: 16px; flex-shrink: 0; transition: opacity 0.2s; }
  .task-row.done .task-emoji { opacity: 0.35; }
  .task-name { font-size: 14px; color: #e8e8e8; transition: all 0.2s; line-height: 1.3; }
  .task-row.done .task-name { color: #2a2a2a; text-decoration: line-through; }
  .task-freq { font-size: 11px; color: #444; margin-top: 1px; }
  .task-row.done .task-freq { color: #2a3a2a; }
  .task-freq.stamped { color: #3a5a3a; font-style: italic; }
  .task-row.once.done .task-freq.stamped { color: #3a5a3a; }
  .task-remove {
    background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.15);
    color: #ef4444; border-radius: 6px; padding: 3px 8px; cursor: pointer;
    font-family: 'Outfit', sans-serif; font-size: 11px; display: none; flex-shrink: 0;
  }
  body.edit-mode .task-remove { display: block; }

  /* ── TASK WRAPPER ── */
  .task-wrap { margin-bottom: 6px; }
  .task-wrap .task-row { margin-bottom: 0; border-radius: 11px 11px 0 0; }
  .task-wrap .task-row.no-notes { border-radius: 11px; }

  /* ── CHEVRON ── */
  .task-chevron {
    flex-shrink: 0; width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    color: #333; transition: transform 0.25s ease, color 0.2s; border-radius: 6px;
  }
  .task-chevron:hover { color: #666; }
  .task-wrap.open .task-chevron { transform: rotate(90deg); color: #555; }

  /* ── NOTES DRAWER ── */
  .task-notes {
    display: none; padding: 12px 16px 14px 16px;
    background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.07);
    border-top: none; border-radius: 0 0 11px 11px;
    font-size: 13px; color: #888; line-height: 1.6;
  }
  .task-wrap.open .task-notes { display: block; }
  .task-notes ul { list-style: none; padding: 0; margin: 0; }
  .task-notes ul li { display: flex; gap: 8px; margin-bottom: 5px; }
  .task-notes ul li:last-child { margin-bottom: 0; }
  .task-notes ul li::before { content: "–"; color: #444; flex-shrink: 0; }
  .task-notes p { margin-bottom: 6px; }
  .task-notes p:last-child { margin-bottom: 0; }

  /* ── SECTION PILL ── */
  .section-pill {
    font-size: 9px; font-weight: 600; letter-spacing: 1.5px;
    padding: 2px 7px; border-radius: 99px;
    opacity: 0.7; flex-shrink: 0; align-self: center;
  }

  /* ── ONE-TIME TASK ── */
  .task-row.once { background: rgba(180,30,30,0.06); border-color: rgba(180,30,30,0.15); }
  .task-row.once .task-name { color: #c97070; }
  .task-row.once .task-freq { color: #6b3a3a; }
  .task-row.once .task-checkbox { border-color: #4a2020; }
  .task-row.once.done { background: rgba(74,222,128,0.04); border-color: rgba(74,222,128,0.12); }
  .task-row.once.done .task-name { color: #2a2a2a; text-decoration: line-through; }
  .task-row.once.done .task-freq { color: #2a3a2a; }
  .task-row.once.done .task-checkbox { border-color: #4ade80; background: #4ade80; }
  .task-row.once.done .task-emoji { opacity: 0.35; }

  /* ── TYPE SUBHEADER ── */
  .type-header {
    font-size: 9px; font-weight: 700; letter-spacing: 3px;
    color: #2a2a2a; margin: 18px 0 10px 2px;
    display: flex; align-items: center; gap: 10px;
  }
  .type-header::after { content: ''; flex: 1; height: 1px; background: #161616; }
  .type-header.once-header { color: #4a2020; }
  .type-header.once-header::after { background: #2a1010; }
  .type-header.once-header.once-all-done { color: #4ade80; }
  .type-header.once-header.once-all-done::after { background: #1a3a1a; }

  /* ── VIEW LABELS ── */
  .view-label { font-size: 11px; color: #444; letter-spacing: 2.5px; margin-bottom: 20px; font-weight: 600; }

  #empty-state { color: #333; font-size: 13px; font-style: italic; margin-top: 8px; display: none; }
  #loading-state { color: #1e1e1e; font-size: 13px; font-style: italic; margin-top: 8px; }

  /* ── EDIT BUTTON ── */
  #edit-btn {
    background: transparent; border: 1px solid #252525; color: #555;
    border-radius: 8px; padding: 7px 14px; cursor: pointer;
    font-family: 'Outfit', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 1.5px; transition: all 0.2s;
  }
  body.edit-mode #edit-btn { border-color: #333; color: #888; }

  /* ── ADD FORM ── */
  #add-form { display: none; flex-direction: column; gap: 8px; padding-top: 16px; border-top: 1px solid #141414; margin-top: 8px; }
  body.edit-mode #add-form { display: flex; }
  #add-form label { font-size: 10px; color: #2a2a2a; letter-spacing: 2px; margin-bottom: 4px; }
  #add-form input, #add-form select {
    background: #0e0e0e; border: 1px solid #1c1c1c; color: #c8c8c8;
    border-radius: 8px; padding: 8px 11px; font-family: 'Outfit', sans-serif; font-size: 13px; outline: none;
  }
  #add-form .row { display: flex; gap: 8px; flex-wrap: wrap; }
  #add-form #inp-emoji { width: 44px; text-align: center; font-size: 18px; padding: 8px 4px; }
  #add-form #inp-name { flex: 1; min-width: 120px; }
  #add-form select { flex: 1; min-width: 100px; }
  #add-btn {
    background: #141414; border: 1px solid #1e1e1e; color: #888;
    border-radius: 8px; padding: 9px; cursor: pointer;
    font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 1px;
  }

  /* ── WEEK VIEW ── */
  #week-strip { display: flex; gap: 8px; margin-bottom: 28px; }
  .week-day {
    flex: 1; border-radius: 12px; padding: 12px 6px; text-align: center; cursor: pointer;
    background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.05);
    transition: all 0.15s; -webkit-tap-highlight-color: transparent;
  }
  .week-day:active { transform: scale(0.97); }
  .week-day.selected { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.15); }
  .week-day.heavy { border-color: rgba(251,146,60,0.2); }
  .week-day-name { font-size: 9px; font-weight: 600; letter-spacing: 2px; color: #444; margin-bottom: 6px; }
  .week-day.selected .week-day-name { color: #888; }
  .week-day-num { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 300; color: #333; line-height: 1; }
  .week-day.selected .week-day-num { color: #ffffff; }
  .week-day-count { font-size: 9px; color: #333; margin-top: 5px; letter-spacing: 1px; }
  .week-day.selected .week-day-count { color: #555; }
  .week-day-dots { display: flex; justify-content: center; gap: 3px; margin-top: 6px; min-height: 5px; }
  .week-dot { width: 5px; height: 5px; border-radius: 99px; opacity: 0.6; }

  #week-detail { flex: 1; }
  .week-detail-header {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px; font-weight: 300; color: #ffffff;
    margin-bottom: 4px; line-height: 1;
  }
  .week-detail-sub { font-size: 11px; color: #444; letter-spacing: 2px; margin-bottom: 20px; }
  .week-no-tasks { font-size: 13px; color: #2a2a2a; font-style: italic; }

  /* ── HISTORY VIEW ── */
  #history-range { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }
  .range-btn {
    background: none; border: 1px solid #1e1e1e; color: #333;
    border-radius: 8px; padding: 5px 12px; cursor: pointer;
    font-family: 'Outfit', sans-serif; font-size: 9px; font-weight: 600;
    letter-spacing: 1.5px; transition: all 0.2s;
  }
  .range-btn.active { border-color: #333; color: #888; }
  .range-btn:hover:not(.active) { color: #555; border-color: #252525; }

  .history-empty { font-size: 13px; color: #2a2a2a; font-style: italic; margin-top: 8px; }

  .stat-card {
    background: #0e0e0e; border: 1px solid #161616; border-radius: 14px;
    padding: 20px 22px; margin-bottom: 12px;
  }
  .stat-card-title { font-size: 9px; color: #333; letter-spacing: 2.5px; font-weight: 600; margin-bottom: 14px; }
  .stat-card-big {
    font-family: 'Cormorant Garamond', serif; font-size: 52px;
    font-weight: 300; color: #ffffff; line-height: 1; letter-spacing: -2px;
  }
  .stat-card-sub { font-size: 11px; color: #444; margin-top: 4px; }

  .streak-row { display: flex; gap: 10px; margin-bottom: 12px; }
  .streak-box {
    flex: 1; background: #0e0e0e; border: 1px solid #161616; border-radius: 14px;
    padding: 18px 16px; text-align: center;
  }
  .streak-val { font-family: 'Cormorant Garamond', serif; font-size: 42px; font-weight: 300; color: #ffffff; line-height: 1; }
  .streak-lbl { font-size: 9px; color: #333; letter-spacing: 2px; margin-top: 5px; }

  .history-bar-section { margin-bottom: 20px; }
  .history-bar-row { margin-bottom: 10px; }
  .history-bar-meta { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .history-bar-name { font-size: 10px; color: #555; letter-spacing: 1.5px; }
  .history-bar-val { font-size: 10px; color: #444; }
  .history-bar-track { height: 3px; background: #1a1a1a; border-radius: 99px; }
  .history-bar-fill { height: 100%; border-radius: 99px; opacity: 0.7; }

  /* ── RIGHT COLUMN ── */
  #ring-wrap { position: relative; width: 220px; height: 220px; }
  #ring-wrap svg { position: absolute; transform: rotate(-90deg); }
  #ring-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  #ring-pct { font-family: 'Cormorant Garamond', serif; font-size: 56px; font-weight: 300; color: #ffffff; line-height: 1; letter-spacing: -3px; }
  #ring-pct span { font-size: 22px; color: #555; letter-spacing: 0; }
  #ring-label { font-size: 10px; color: #555; letter-spacing: 2px; margin-top: 3px; }

  #motivate-wrap { text-align: center; margin-top: 28px; margin-bottom: 32px; }
  #motivate-msg { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 300; line-height: 1.1; margin-bottom: 8px; transition: color 0.5s; }
  #motivate-sub { font-size: 13px; color: #555; }

  #stats { display: flex; gap: 10px; width: 100%; margin-bottom: 28px; }
  .stat-box { flex: 1; background: #111; border: 1px solid #1e1e1e; border-radius: 12px; padding: 14px 0; text-align: center; }
  .stat-val { font-family: 'Cormorant Garamond', serif; font-size: 38px; font-weight: 300; line-height: 1; }
  .stat-lbl { font-size: 9px; color: #444; letter-spacing: 2px; margin-top: 5px; }

  #sec-bars { width: 100%; display: flex; flex-direction: column; gap: 12px; }
  .bar-meta { display: flex; justify-content: space-between; margin-bottom: 5px; }
  .bar-name { font-size: 10px; color: #555; letter-spacing: 1.5px; }
  .bar-count { font-size: 10px; color: #444; }
  .bar-track { height: 3px; background: #1a1a1a; border-radius: 99px; }
  .bar-fill { height: 100%; border-radius: 99px; opacity: 0.6; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }

  #footer-note { margin-top: 32px; font-size: 9px; color: #181818; letter-spacing: 1px; text-align: center; }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    #app { grid-template-columns: 1fr; grid-template-rows: auto auto; }
    #right { position: static; height: auto; padding: 28px 24px 36px; border-top: 1px solid #111; flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 24px; }
    #ring-wrap { width: 140px; height: 140px; flex-shrink: 0; }
    #ring-pct { font-size: 36px; }
    #ring-pct span { font-size: 15px; }
    #motivate-wrap { margin: 0; text-align: left; flex: 1; min-width: 160px; }
    #motivate-msg { font-size: 24px; }
    #stats { width: 100%; }
    #sec-bars { width: 100%; }
    #footer-note { width: 100%; }
    #left { padding: 28px 20px; }
    #clock-day  { font-size: 38px; }
    #clock-date { font-size: 13px; }
    #clock-time { font-size: 12px; }
    #week-strip { gap: 5px; }
    .week-day { padding: 10px 3px; }
    .week-day-num { font-size: 20px; }
  }
  @media (max-width: 480px) {
    #left { padding: 20px 16px; }
    #right { padding: 20px 16px 28px; }
    #clock-day  { font-size: 30px; }
    #clock-date { font-size: 12px; }
    #clock-time { font-size: 11px; }
    #ring-wrap { width: 120px; height: 120px; }
    #ring-pct { font-size: 30px; }
    .task-row { padding: 10px 12px; }
  }
</style>
</head>
<body>
<div id="app">

  <div id="left">
    <!-- Header -->
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;">
      <div>
        <div id="clock-day">Monday</div>
        <div id="clock-date">March 9, 2026</div>
        <div id="clock-time">12:00<span>am</span></div>
        <div id="sync-status">LOADING…</div>
      </div>
      <button id="edit-btn" onclick="toggleEdit()">EDIT</button>
    </div>

    <!-- Nav -->
    <div id="nav">
      <button class="nav-btn active" onclick="switchView('today')">TODAY</button>
      <button class="nav-btn" onclick="switchView('week')">WEEK AHEAD</button>
      <button class="nav-btn" onclick="switchView('history')">HISTORY</button>
    </div>

    <!-- TODAY VIEW -->
    <div id="view-today">
      <div class="view-label">TODAY'S ACTIONS</div>
      <div id="task-list">
        <div id="loading-state">Syncing with your task list…</div>
      </div>
      <div id="empty-state">No further tasks scheduled for today.</div>

      <div id="add-form">
        <label>ADD TASK</label>
        <div class="row">
          <input id="inp-emoji" value="✅" maxlength="2"/>
          <input id="inp-name" placeholder="Task name…"/>
        </div>
        <div class="row">
          <select id="inp-section">
            <option value="home">Household</option>
            <option value="vehicle">Vehicle</option>
            <option value="finance">Finance</option>
          </select>
          <select id="inp-type" onchange="onTypeChange()">
            <option value="recurring">Recurring</option>
            <option value="once">One Time Only</option>
          </select>
          <select id="inp-freq" onchange="onFreqChange()">
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="monthly-sat">Monthly (1st Sat)</option>
            <option value="monthly-check">Monthly reminder</option>
          </select>
          <select id="inp-dow" style="display:none">
            <option value="0">Sunday</option>
            <option value="1">Monday</option>
            <option value="2">Tuesday</option>
            <option value="3">Wednesday</option>
            <option value="4">Thursday</option>
            <option value="5">Friday</option>
            <option value="6" selected>Saturday</option>
          </select>
        </div>
        <button id="add-btn" onclick="addTask()">+ ADD TASK</button>
      </div>
    </div>

    <!-- WEEK VIEW -->
    <div id="view-week" style="display:none">
      <div class="view-label">WEEK AHEAD</div>
      <div id="week-strip"></div>
      <div id="week-detail"></div>
    </div>

    <!-- HISTORY VIEW -->
    <div id="view-history" style="display:none">
      <div class="view-label">HISTORY</div>
      <div id="history-range">
        <button class="range-btn active" onclick="setRange(30,this)">30 DAYS</button>
        <button class="range-btn" onclick="setRange(180,this)">180 DAYS</button>
        <button class="range-btn" onclick="setRange(365,this)">1 YEAR</button>
        <button class="range-btn" onclick="setRange(99999,this)">ALL TIME</button>
      </div>
      <div id="history-content"></div>
    </div>
  </div>

  <!-- RIGHT COLUMN -->
  <div id="right">
    <div id="ring-wrap">
      <svg width="220" height="220">
        <circle cx="110" cy="110" r="100" fill="none" stroke="#1a1a1a" stroke-width="13"/>
        <circle id="ring-fill" cx="110" cy="110" r="100" fill="none" stroke="#4ade80" stroke-width="13"
          stroke-dasharray="628.3" stroke-dashoffset="628.3" stroke-linecap="round"
          style="transition:stroke-dashoffset 0.9s cubic-bezier(0.4,0,0.2,1),stroke 0.4s ease"/>
      </svg>
      <div id="ring-inner">
        <div id="ring-pct">0<span>%</span></div>
        <div id="ring-label">COMPLETE</div>
      </div>
    </div>

    <div id="motivate-wrap">
      <div id="motivate-msg" style="color:#f87171">Fresh start.</div>
      <div id="motivate-sub">Loading…</div>
    </div>

    <div id="stats">
      <div class="stat-box"><div class="stat-val" id="stat-done" style="color:#4ade80">0</div><div class="stat-lbl">DONE</div></div>
      <div class="stat-box"><div class="stat-val" id="stat-total" style="color:#333">0</div><div class="stat-lbl">TOTAL</div></div>
      <div class="stat-box"><div class="stat-val" id="stat-left" style="color:#facc15">0</div><div class="stat-lbl">LEFT</div></div>
    </div>

    <div id="sec-bars"></div>
    <div id="footer-note">Syncs from Google Sheets · Resets daily · Tap to mark done</div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRQU7y4flPg9AmYc5FGPkWe91tkyl-i_MG9yqv8Af5NaEPED88Zf5itR3lP-e5pIs8RcKT-5-ebk1j9/pub?gid=849784355&single=true&output=csv";
const API_URL  = "https://script.google.com/macros/s/AKfycbwuHmio9pDdSGRxgtZ86FaAoeNSQN3ZB3BET49i8RX7yGHx-DVeQe7Pe8spOe26pdc3/exec";
const SYNC_MS  = 5 * 60 * 1000;

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const DAYS   = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const SECTIONS = [
  { key:"home",    label:"Household", accent:"#4ade80" },
  { key:"vehicle", label:"Vehicle",   accent:"#e8e8e8" },
  { key:"finance", label:"Finance",   accent:"#facc15" },
];
const CIRC = 2 * Math.PI * 100;

// ─── BIWEEKLY ANCHORS ─────────────────────────────────────────────────────────
const GARBAGE_ON   = new Date("2026-02-19T00:00:00");
const CAT_WATER_ON = new Date("2026-03-08T00:00:00");
const MIRRORS_ON   = new Date("2026-03-07T00:00:00");

// ─── DATE HELPERS ─────────────────────────────────────────────────────────────
function isGarbageWeek(d) {
  const thu = new Date(d);
  thu.setDate(d.getDate() + ((4 - d.getDay() + 7) % 7));
  thu.setHours(0,0,0,0);
  return Math.floor((thu - GARBAGE_ON) / (7*864e5)) % 2 === 0;
}
function isCatWaterDay(d) {
  const t = new Date(d); t.setHours(0,0,0,0);
  return Math.round((t - CAT_WATER_ON) / 864e5) % 2 === 0;
}
function isMirrorsWeek(d) {
  const sat = new Date(d);
  sat.setDate(d.getDate() + ((6 - d.getDay() + 7) % 7));
  sat.setHours(0,0,0,0);
  return Math.floor((sat - MIRRORS_ON) / (7*864e5)) % 2 === 0;
}
function isNthWeekday(d, dow, n) {
  return d.getDay() === dow && Math.ceil(d.getDate() / 7) === n;
}
function dateKey(d) { return d.toISOString().slice(0,10); }
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }

function isDueOn(task, d) {
  if (task.type === 'once') return true; // once tasks only shown for today
  const dow = d.getDay(), month = d.getMonth() + 1;
  switch (task.freq) {
    case "daily":                return true;
    case "weekly":               return task.dow === dow;
    case "biweekly-thu":
    case "biweekly-thu-garbage": return dow === 4 && isGarbageWeek(d);
    case "biweekly-daily":
    case "biweekly-daily-cat":   return isCatWaterDay(d);
    case "biweekly-sat":
    case "biweekly-sat-mirrors": return dow === 6 && isMirrorsWeek(d);
    case "monthly-sat":
    case "monthly-check":        return isNthWeekday(d, 6, 1);
    case "yearly":               return task.yearMonth === month && isNthWeekday(d, 6, 1);
    default: return false;
  }
}

function isDueToday(task, d) {
  if (pushForwardList.includes(task.id)) return true;
  return isDueOn(task, d);
}

function freqLabel(task) {
  switch (task.freq) {
    case "daily":                return "Every day";
    case "weekly":               return "Every " + DAYS[task.dow];
    case "biweekly-thu":
    case "biweekly-thu-garbage": return "Every other Thursday";
    case "biweekly-daily":
    case "biweekly-daily-cat":   return "Every other day";
    case "biweekly-sat":
    case "biweekly-sat-mirrors": return "Every other Saturday";
    case "monthly-sat":
    case "monthly-check":        return "Monthly · 1st Saturday";
    case "yearly":               return "Yearly · " + MONTHS[(task.yearMonth||1) - 1];
    case "once":                 return "One time only";
    default: return task.type === "once" ? "One time only" : "";
  }
}

// ─── CSV PARSER ───────────────────────────────────────────────────────────────
function parseCSVLine(line) {
  const cols = []; let cur = "", inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQuote && line[i+1] === '"') { cur += '"'; i++; }
      else inQuote = !inQuote;
    } else if (ch === ',' && !inQuote) {
      cols.push(cur.trim()); cur = "";
    } else { cur += ch; }
  }
  cols.push(cur.trim());
  return cols;
}

function parseCSV(text) {
  const rows = []; let cur = "", inQuote = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') {
      if (inQuote && text[i+1] === '"') { cur += '"'; i++; }
      else inQuote = !inQuote;
      cur += ch;
    } else if (ch === '\n' && !inQuote) {
      if (cur.replace(/\r/g,'').length) rows.push(cur.replace(/\r/g,''));
      cur = "";
    } else { cur += ch; }
  }
  if (cur.replace(/\r/g,'').length) rows.push(cur.replace(/\r/g,''));
  if (rows.length < 2) return [];
  const headers = parseCSVLine(rows[0]).map(h => h.toLowerCase().replace(/\r/g,""));
  return rows.slice(1).map(line => {
    const cols = parseCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (cols[i] || "").replace(/\r/g,""); });
    const rawNotes  = obj["notes"] || "";
    const taskType  = (obj["type"] || "").toLowerCase().trim();
    const taskFreq  = taskType === 'once' ? 'once' : (obj["frequency"] || obj["freq"] || "daily");
    return {
      id:          obj["id"]        || "",
      name:        obj["name"]      || "",
      emoji:       obj["emoji"]     || "✅",
      section:     obj["section"]   || "home",
      freq:        taskFreq,
      dow:         obj["dow"]       !== "" ? parseInt(obj["dow"])       : undefined,
      yearMonth:   obj["yearmonth"] !== "" ? parseInt(obj["yearmonth"]) : undefined,
      notes:       rawNotes,
      pushforward: (obj["pushforward"] || "").toLowerCase().trim(),
      type:        taskType,
    };
  }).filter(t => (t.id || t.type === 'once') && t.name)
    .map(t => {
      if (!t.id && t.type === 'once') {
        t.id = 'tmp_' + btoa(unescape(encodeURIComponent(t.name + t.section))).slice(0,12);
      }
      return t;
    });
}

// ─── APPS SCRIPT API ─────────────────────────────────────────────────────────
async function fetchHistory() {
  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    if (Array.isArray(data)) {
      permanentHistory = {};
      data.forEach(entry => {
        if (!permanentHistory[entry.taskId] ||
            new Date(entry.completedAt) > new Date(permanentHistory[entry.taskId].completedAt)) {
          permanentHistory[entry.taskId] = entry;
        }
      });
      // Also build raw history array for analytics
      rawHistory = data;
      try { localStorage.setItem("hd_history_cache", JSON.stringify({ perm: permanentHistory, raw: rawHistory })); } catch(e) {}
    }
  } catch(err) {
    try {
      const c = JSON.parse(localStorage.getItem("hd_history_cache") || "null");
      if (c) { permanentHistory = c.perm || {}; rawHistory = c.raw || []; }
    } catch(e) {}
  }
  if (currentView === 'history') renderHistory();
}

async function commitToHistory(entries) {
  try {
    await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ action: "commit", entries })
    });
    entries.forEach(entry => {
      if (!permanentHistory[entry.taskId] ||
          new Date(entry.completedAt) > new Date(permanentHistory[entry.taskId].completedAt)) {
        permanentHistory[entry.taskId] = entry;
      }
      rawHistory.push(entry);
    });
    try { localStorage.setItem("hd_history_cache", JSON.stringify({ perm: permanentHistory, raw: rawHistory })); } catch(e) {}
  } catch(err) { console.warn("Commit failed:", err); }
}

async function ensureOneTimeIds() {
  try {
    await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ action: "ensureIds" })
    });
    setTimeout(async () => {
      try {
        const res = await fetch(SHEET_CSV_URL + "&cachebust=" + Date.now());
        const parsed = parseCSV(await res.text());
        if (parsed.length) {
          sheetTasks = parsed;
          try { localStorage.setItem("hd_sheet_cache", JSON.stringify(sheetTasks)); } catch(e) {}
          render();
        }
      } catch(e) {}
    }, 2000);
  } catch(err) { console.warn("ensureIds failed:", err); }
}

// ─── SYNC ─────────────────────────────────────────────────────────────────────
let sheetTasks = [];

async function syncFromSheet() {
  const el = document.getElementById("sync-status");
  el.textContent = "SYNCING…"; el.className = "syncing";
  const url = SHEET_CSV_URL + "&cachebust=" + Date.now();
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const parsed = parseCSV(await res.text());
    if (!parsed.length) throw new Error("empty");
    sheetTasks = parsed;
    try { localStorage.setItem("hd_sheet_cache", JSON.stringify(sheetTasks)); } catch(e) {}
    const now = new Date();
    const h = now.getHours() % 12 || 12, m = String(now.getMinutes()).padStart(2,"0");
    el.textContent = "SYNCED " + h + ":" + m + (now.getHours() >= 12 ? "pm" : "am");
    el.className = "ok";
  } catch(err) {
    try {
      const c = JSON.parse(localStorage.getItem("hd_sheet_cache") || "null");
      if (c && c.length) sheetTasks = c;
    } catch(e) {}
    el.textContent = sheetTasks.length ? "OFFLINE · CACHED" : "SYNC FAILED";
    el.className = "error";
  }
  document.getElementById("loading-state").style.display = "none";
  ensureOneTimeIds();
  render();
}

// ─── STATE ────────────────────────────────────────────────────────────────────
function loadCustom()  { try { return JSON.parse(localStorage.getItem("hd_custom") || "[]"); } catch { return []; } }
function saveCustom(t) { localStorage.setItem("hd_custom", JSON.stringify(t)); }
function loadDone()    { try { return JSON.parse(localStorage.getItem("hd_done")   || "{}"); } catch { return {}; } }
function saveDone(d)   { localStorage.setItem("hd_done", JSON.stringify(d)); }
function loadPushFwd() { try { return JSON.parse(localStorage.getItem("hd_pushfwd") || "[]"); } catch { return []; } }
function savePushFwd(p){ localStorage.setItem("hd_pushfwd", JSON.stringify(p)); }

let customTasks      = loadCustom();
let doneLog          = loadDone();
let permanentHistory = {};
let rawHistory       = [];
let pushForwardList  = loadPushFwd();
let editMode         = false;
let currentView      = 'today';
let selectedWeekDay  = 0; // index into weekDates array
let historyRangeDays = 30;

const today    = new Date(); today.setHours(0,0,0,0);
const todayKey = today.toISOString().slice(0,10);

// Build week ahead dates: tomorrow + 6 days
const weekDates = Array.from({length:7}, (_,i) => addDays(today, i+1));

// ─── FORMAT HELPERS ───────────────────────────────────────────────────────────
function formatStamp(isoString) {
  const d = new Date(isoString);
  const h = d.getHours() % 12 || 12;
  const m = String(d.getMinutes()).padStart(2, "0");
  const ampm = d.getHours() >= 12 ? "PM" : "AM";
  return `${h}:${m} ${ampm}, ${MONTHS[d.getMonth()].slice(0,3)} ${d.getDate()}, ${d.getFullYear()}`;
}

// ─── 11:59 PM COMMIT ─────────────────────────────────────────────────────────
function checkMidnightCommit() {
  const now = new Date();
  if (now.getHours() === 23 && now.getMinutes() === 59) {
    const committed = localStorage.getItem("hd_committed_" + todayKey);
    if (!committed) {
      localStorage.setItem("hd_committed_" + todayKey, "1");
      performCommit();
    }
  }
  if (now.getHours() === 0 && now.getMinutes() === 0) location.reload();
}

async function performCommit() {
  const allTasks = [...sheetTasks, ...customTasks];
  const entries = [];
  Object.keys(doneLog).forEach(key => {
    if (key.endsWith("_" + todayKey)) {
      entries.push({ taskId: key.replace("_" + todayKey, ""), completedAt: doneLog[key], dateKey: todayKey });
    }
  });
  if (entries.length > 0) await commitToHistory(entries);
  const newPushFwd = [];
  allTasks.forEach(task => {
    if (task.pushforward === "yes" && !doneLog[task.id + "_" + todayKey]) newPushFwd.push(task.id);
  });
  const merged = [...new Set([...pushForwardList, ...newPushFwd])];
  savePushFwd(merged.filter(id => !entries.find(e => e.taskId === id)));
}

// ─── CLOCK ────────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const h = now.getHours() % 12 || 12, m = String(now.getMinutes()).padStart(2,"0");
  document.getElementById("clock-day").textContent  = DAYS[now.getDay()];
  document.getElementById("clock-date").textContent = MONTHS[now.getMonth()] + " " + now.getDate() + ", " + now.getFullYear();
  document.getElementById("clock-time").innerHTML   = h + ":" + m + "<span>" + (now.getHours()>=12?"pm":"am") + "</span>";
}
setInterval(updateClock, 1000);
updateClock();

// ─── SHARED TASK ROW BUILDER ──────────────────────────────────────────────────
function buildTaskRow(task, isOnce, isDone, isCustom, stampText, isReadOnly) {
  const hasNotes = !!(task.notes && task.notes.trim());
  let notesHTML = "";
  if (hasNotes) {
    const lines   = task.notes.trim().split(/\n|\|/);
    const boldify = s => s.replace(/\*\*(.+?)\*\*/g, '<strong style="color:#c8c8c8;font-weight:600">$1</strong>');
    const bullets = lines.filter(l => l.trim().startsWith("- "));
    const prose   = lines.filter(l => !l.trim().startsWith("- ") && l.trim());
    let inner = "";
    if (prose.length)   inner += prose.map(l => `<p>${boldify(l.trim())}</p>`).join("");
    if (bullets.length) inner += "<ul>" + bullets.map(l => `<li>${boldify(l.trim().slice(2))}</li>`).join("") + "</ul>";
    notesHTML = `<div class="task-notes">${inner}</div>`;
  }
  const secObj  = SECTIONS.find(s => s.key === task.section);
  const pillHTML = isOnce && secObj
    ? `<span class="section-pill" style="background:${secObj.accent}22;color:${secObj.accent};border:1px solid ${secObj.accent}33">${secObj.label.toUpperCase()}</span>`
    : '';

  const wrap = document.createElement("div");
  wrap.className = "task-wrap";
  const row = document.createElement("div");
  row.className = "task-row"
    + (isDone     ? " done"     : "")
    + (hasNotes   ? ""          : " no-notes")
    + (isOnce     ? " once"     : "")
    + (isReadOnly ? " readonly" : "");
  row.innerHTML = `
    <div class="task-checkbox"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 3.5l3 3 5-5" stroke="#0a0a0a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <span class="task-emoji">${task.emoji}</span>
    <div style="flex:1"><div class="task-name">${task.name}</div><div class="task-freq">${stampText || freqLabel(task)}</div></div>
    ${pillHTML}
    ${isCustom && !isReadOnly ? `<button class="task-remove" onclick="removeTask('${task.id}',event)">\u2715</button>` : ""}
    ${hasNotes ? `<div class="task-chevron"><svg width="7" height="12" viewBox="0 0 7 12" fill="none"><path d="M1 1l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>` : ""}`;

  if (!isReadOnly) {
    row.addEventListener("click", (e) => {
      if (e.target.closest(".task-chevron")) { wrap.classList.toggle("open"); return; }
      if (e.target.closest(".task-remove")) return;
      toggleTask(task.id);
    });
  } else if (hasNotes) {
    row.addEventListener("click", (e) => {
      if (e.target.closest(".task-chevron")) { wrap.classList.toggle("open"); }
    });
  }
  wrap.appendChild(row);
  if (hasNotes) wrap.insertAdjacentHTML("beforeend", notesHTML);
  return wrap;
}

// ─── RENDER TODAY ─────────────────────────────────────────────────────────────
function render() {
  const allTasks   = [...sheetTasks, ...customTasks];
  const todayTasks = allTasks.filter(t => isDueToday(t, today));
  const total      = todayTasks.length;
  const doneCount  = todayTasks.filter(t => doneLog[t.id + "_" + todayKey]).length;
  const pct        = total === 0 ? 100 : Math.round((doneCount / total) * 100);
  const remaining  = total - doneCount;

  const listEl  = document.getElementById("task-list");
  const emptyEl = document.getElementById("empty-state");
  listEl.innerHTML = "";

  if (total === 0 && sheetTasks.length > 0) {
    emptyEl.style.display = "block";
  } else {
    emptyEl.style.display = "none";

    // ── 1. ONE TIME ONLY ──────────────────────────────────────────────────────
    const allOnceTasks = todayTasks.filter(t => t.type === 'once');
    if (allOnceTasks.length > 0) {
      const allOnceDone = allOnceTasks.every(t => !!doneLog[t.id + "_" + todayKey]);
      const oHdr = document.createElement("div");
      oHdr.className = "type-header once-header" + (allOnceDone ? " once-all-done" : "");
      oHdr.textContent = "ONE TIME ONLY";
      listEl.appendChild(oHdr);
      [...allOnceTasks].sort((a,b) => !!doneLog[a.id+"_"+todayKey] - !!doneLog[b.id+"_"+todayKey])
        .forEach(task => {
          const isDone    = !!doneLog[task.id + "_" + todayKey];
          const isCustom  = customTasks.some(c => c.id === task.id);
          const tempStamp = isDone ? "Last completed " + formatStamp(doneLog[task.id+"_"+todayKey]) : null;
          const permEntry = permanentHistory[task.id];
          const permStamp = (!isDone && permEntry && permEntry.dateKey !== todayKey)
            ? "Last completed " + formatStamp(permEntry.completedAt) : null;
          listEl.appendChild(buildTaskRow(task, true, isDone, isCustom, tempStamp || permStamp, false));
        });
    }

    // ── 2. RECURRING ─────────────────────────────────────────────────────────
    const anyRecurring = todayTasks.some(t => t.type !== 'once');
    if (anyRecurring) {
      const rHdr = document.createElement("div");
      rHdr.className = "type-header";
      rHdr.textContent = "RECURRING";
      listEl.appendChild(rHdr);
      SECTIONS.forEach(sec => {
        const secTasks = todayTasks.filter(t => t.section === sec.key && t.type !== 'once');
        if (!secTasks.length) return;
        const secDone = secTasks.filter(t => doneLog[t.id + "_" + todayKey]).length;
        const hdr = document.createElement("div");
        hdr.className = "section-header";
        hdr.innerHTML = `<div class="section-pip" style="background:${sec.accent}"></div><span class="section-label">${sec.label.toUpperCase()}</span><span class="section-count">${secDone}/${secTasks.length}</span>`;
        listEl.appendChild(hdr);
        [...secTasks].sort((a,b) => !!doneLog[a.id+"_"+todayKey] - !!doneLog[b.id+"_"+todayKey])
          .forEach(task => {
            const isDone    = !!doneLog[task.id + "_" + todayKey];
            const isCustom  = customTasks.some(c => c.id === task.id);
            const tempStamp = isDone ? "Last completed " + formatStamp(doneLog[task.id+"_"+todayKey]) : null;
            const permEntry = permanentHistory[task.id];
            const permStamp = (!isDone && permEntry && permEntry.dateKey !== todayKey)
              ? "Last completed " + formatStamp(permEntry.completedAt) : null;
            listEl.appendChild(buildTaskRow(task, false, isDone, isCustom, tempStamp || permStamp, false));
          });
      });
    }
  }

  // ── Right column: today stats ─────────────────────────────────────────────
  updateRightColumn(pct, doneCount, total, remaining, todayTasks, todayKey);
}

// ─── RENDER WEEK ──────────────────────────────────────────────────────────────
function renderWeek() {
  const allTasks = [...sheetTasks, ...customTasks].filter(t => t.type !== 'once');
  const stripEl  = document.getElementById("week-strip");
  const detailEl = document.getElementById("week-detail");
  stripEl.innerHTML = "";

  weekDates.forEach((d, i) => {
    const tasks = allTasks.filter(t => isDueOn(t, d));
    const count = tasks.length;
    const isSelected = i === selectedWeekDay;

    const card = document.createElement("div");
    card.className = "week-day" + (isSelected ? " selected" : "") + (count >= 6 ? " heavy" : "");

    // Section dots
    const dotsHTML = SECTIONS.map(sec => {
      const has = tasks.some(t => t.section === sec.key);
      return has ? `<div class="week-dot" style="background:${sec.accent}"></div>` : '';
    }).join('');

    card.innerHTML = `
      <div class="week-day-name">${DAYS[d.getDay()].slice(0,3).toUpperCase()}</div>
      <div class="week-day-num">${d.getDate()}</div>
      <div class="week-day-count">${count > 0 ? count + ' task' + (count !== 1 ? 's' : '') : '—'}</div>
      <div class="week-day-dots">${dotsHTML}</div>`;
    card.addEventListener("click", () => { selectedWeekDay = i; renderWeek(); });
    stripEl.appendChild(card);
  });

  // Detail panel for selected day
  const selDate  = weekDates[selectedWeekDay];
  const selTasks = allTasks.filter(t => isDueOn(t, selDate));
  detailEl.innerHTML = "";

  const dayHdr = document.createElement("div");
  dayHdr.className = "week-detail-header";
  dayHdr.textContent = DAYS[selDate.getDay()];
  detailEl.appendChild(dayHdr);

  const dateSub = document.createElement("div");
  dateSub.className = "week-detail-sub";
  dateSub.textContent = MONTHS[selDate.getMonth()] + " " + selDate.getDate() + ", " + selDate.getFullYear();
  detailEl.appendChild(dateSub);

  if (selTasks.length === 0) {
    const empty = document.createElement("div");
    empty.className = "week-no-tasks";
    empty.textContent = "Nothing scheduled — a free day.";
    detailEl.appendChild(empty);
  } else {
    SECTIONS.forEach(sec => {
      const tasks = selTasks.filter(t => t.section === sec.key);
      if (!tasks.length) return;
      const hdr = document.createElement("div");
      hdr.className = "section-header";
      hdr.innerHTML = `<div class="section-pip" style="background:${sec.accent}"></div><span class="section-label">${sec.label.toUpperCase()}</span><span class="section-count">${tasks.length}</span>`;
      detailEl.appendChild(hdr);
      tasks.forEach(task => {
        detailEl.appendChild(buildTaskRow(task, false, false, false, null, true));
      });
    });
  }

  // Right column: week stats
  const totalWeekTasks = weekDates.reduce((sum, d) => sum + allTasks.filter(t => isDueOn(t, d)).length, 0);
  const avgPerDay = Math.round(totalWeekTasks / 7);
  const ringPct   = selTasks.length === 0 ? 0 : 0; // week ring shows selected day load vs max
  const maxDay    = Math.max(...weekDates.map(d => allTasks.filter(t => isDueOn(t, d)).length), 1);
  const loadPct   = Math.round((selTasks.length / maxDay) * 100);
  const rc = loadPct >= 80 ? "#f87171" : loadPct >= 50 ? "#facc15" : "#4ade80";

  document.getElementById("ring-fill").style.strokeDashoffset = CIRC * (1 - loadPct/100);
  document.getElementById("ring-fill").style.stroke = rc;
  document.getElementById("ring-pct").innerHTML = selTasks.length + '<span style="font-size:18px;letter-spacing:0;color:#555"> tasks</span>';
  document.getElementById("ring-label").textContent = DAYS[selDate.getDay()].toUpperCase();
  document.getElementById("motivate-msg").textContent = selTasks.length === 0 ? "Free day." : loadPct >= 80 ? "Busy day." : loadPct >= 40 ? "Moderate day." : "Light day.";
  document.getElementById("motivate-msg").style.color = rc;
  document.getElementById("motivate-sub").textContent = "~" + avgPerDay + " tasks avg per day";
  document.getElementById("stat-done").textContent  = selTasks.filter(t=>t.section==='home').length;
  document.getElementById("stat-total").textContent = selTasks.filter(t=>t.section==='vehicle').length;
  document.getElementById("stat-left").textContent  = selTasks.filter(t=>t.section==='finance').length;
  document.getElementById("stat-done").parentElement.querySelector(".stat-lbl").textContent  = "HOUSEHOLD";
  document.getElementById("stat-total").parentElement.querySelector(".stat-lbl").textContent = "VEHICLE";
  document.getElementById("stat-left").parentElement.querySelector(".stat-lbl").textContent  = "FINANCE";
  document.getElementById("stat-done").style.color  = "#4ade80";
  document.getElementById("stat-total").style.color = "#e8e8e8";
  document.getElementById("stat-left").style.color  = "#facc15";

  const barsEl = document.getElementById("sec-bars");
  barsEl.innerHTML = "";
  SECTIONS.forEach(sec => {
    const tasks = selTasks.filter(t => t.section === sec.key);
    if (!tasks.length) return;
    const bar = document.createElement("div");
    bar.className = "bar-row";
    bar.innerHTML = `<div class="bar-meta"><span class="bar-name">${sec.label.toUpperCase()}</span><span class="bar-count">${tasks.length}</span></div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(tasks.length/selTasks.length*100)}%;background:${sec.accent}"></div></div>`;
    barsEl.appendChild(bar);
  });
}

// ─── RENDER HISTORY ───────────────────────────────────────────────────────────
function renderHistory() {
  const el = document.getElementById("history-content");
  el.innerHTML = "";

  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - historyRangeDays);
  const filtered = historyRangeDays >= 99999
    ? rawHistory
    : rawHistory.filter(e => new Date(e.completedAt) >= cutoff);

  if (filtered.length === 0) {
    el.innerHTML = '<div class="history-empty">No data yet for this period. Tasks you complete will appear here after midnight commit.</div>';
    // Right column placeholder
    document.getElementById("ring-fill").style.strokeDashoffset = CIRC;
    document.getElementById("ring-fill").style.stroke = "#4ade80";
    document.getElementById("ring-pct").innerHTML = '0<span>%</span>';
    document.getElementById("ring-label").textContent = "COMPLETION";
    document.getElementById("motivate-msg").textContent = "Just getting started.";
    document.getElementById("motivate-msg").style.color = "#555";
    document.getElementById("motivate-sub").textContent = "History builds over time";
    return;
  }

  // Stats
  const uniqueDays   = new Set(filtered.map(e => e.dateKey)).size;
  const totalDone    = filtered.length;
  const avgPerDay    = uniqueDays > 0 ? (totalDone / uniqueDays).toFixed(1) : 0;

  // Streak: consecutive days with at least one completion ending today
  const allDays = [...new Set(rawHistory.map(e => e.dateKey))].sort();
  let streak = 0;
  const check = new Date(today);
  while (true) {
    const k = dateKey(check);
    const hasEntry = rawHistory.some(e => e.dateKey === k) || (k === todayKey && Object.keys(doneLog).some(k2 => k2.endsWith('_' + todayKey)));
    if (hasEntry) { streak++; check.setDate(check.getDate() - 1); }
    else break;
  }

  // Overall completion rate (approximate: done vs total tasks per day)
  const allTasks = [...sheetTasks, ...customTasks].filter(t => t.type !== 'once');
  const sampleDate = new Date(today); sampleDate.setDate(1);
  const sampledTotal = allTasks.filter(t => isDueOn(t, sampleDate)).length || 1;
  const completionRate = Math.min(100, Math.round((totalDone / (uniqueDays * sampledTotal)) * 100));

  // Right column
  const rc = completionRate >= 80 ? "#4ade80" : completionRate >= 50 ? "#facc15" : "#f87171";
  document.getElementById("ring-fill").style.strokeDashoffset = CIRC * (1 - completionRate/100);
  document.getElementById("ring-fill").style.stroke = rc;
  document.getElementById("ring-pct").innerHTML = completionRate + '<span>%</span>';
  document.getElementById("ring-label").textContent = "COMPLETION";
  document.getElementById("motivate-msg").textContent = streak >= 7 ? "Great streak." : streak >= 3 ? "Building momentum." : "Keep going.";
  document.getElementById("motivate-msg").style.color = rc;
  document.getElementById("motivate-sub").textContent = streak + " day streak";
  document.getElementById("stat-done").textContent  = totalDone;
  document.getElementById("stat-total").textContent = uniqueDays;
  document.getElementById("stat-left").textContent  = streak;
  document.getElementById("stat-done").parentElement.querySelector(".stat-lbl").textContent  = "COMPLETED";
  document.getElementById("stat-total").parentElement.querySelector(".stat-lbl").textContent = "ACTIVE DAYS";
  document.getElementById("stat-left").parentElement.querySelector(".stat-lbl").textContent  = "STREAK";
  document.getElementById("stat-done").style.color  = "#4ade80";
  document.getElementById("stat-total").style.color = "#e8e8e8";
  document.getElementById("stat-left").style.color  = "#facc15";

  // Section breakdown bars
  const barsEl = document.getElementById("sec-bars");
  barsEl.innerHTML = "";
  const maxSec = Math.max(...SECTIONS.map(s => filtered.filter(e => {
    const task = [...sheetTasks, ...customTasks].find(t => t.id === e.taskId);
    return task && task.section === s.key;
  }).length), 1);
  SECTIONS.forEach(sec => {
    const count = filtered.filter(e => {
      const task = [...sheetTasks, ...customTasks].find(t => t.id === e.taskId);
      return task && task.section === sec.key;
    }).length;
    if (!count) return;
    const bar = document.createElement("div");
    bar.className = "bar-row";
    bar.innerHTML = `<div class="bar-meta"><span class="bar-name">${sec.label.toUpperCase()}</span><span class="bar-count">${count}</span></div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(count/maxSec*100)}%;background:${sec.accent}"></div></div>`;
    barsEl.appendChild(bar);
  });

  // Cards
  el.innerHTML = `
    <div class="streak-row">
      <div class="streak-box"><div class="streak-val" style="color:#facc15">${streak}</div><div class="streak-lbl">DAY STREAK</div></div>
      <div class="streak-box"><div class="streak-val" style="color:#4ade80">${totalDone}</div><div class="streak-lbl">TASKS DONE</div></div>
      <div class="streak-box"><div class="streak-val" style="color:#e8e8e8">${avgPerDay}</div><div class="streak-lbl">AVG / DAY</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-card-title">COMPLETION RATE</div>
      <div class="stat-card-big" style="color:${rc}">${completionRate}%</div>
      <div class="stat-card-sub">Across ${uniqueDays} active day${uniqueDays !== 1 ? 's' : ''}</div>
    </div>`;

  // Top completed tasks
  const taskCounts = {};
  filtered.forEach(e => { taskCounts[e.taskId] = (taskCounts[e.taskId] || 0) + 1; });
  const topTasks = Object.entries(taskCounts)
    .sort((a,b) => b[1]-a[1]).slice(0,5)
    .map(([id, count]) => {
      const task = [...sheetTasks, ...customTasks].find(t => t.id === id);
      return task ? { task, count } : null;
    }).filter(Boolean);

  if (topTasks.length > 0) {
    const card = document.createElement("div");
    card.className = "stat-card";
    card.innerHTML = `<div class="stat-card-title">MOST COMPLETED</div>`;
    topTasks.forEach(({ task, count }) => {
      const sec = SECTIONS.find(s => s.key === task.section);
      card.innerHTML += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <span style="font-size:15px">${task.emoji}</span>
        <span style="font-size:13px;color:#888;flex:1">${task.name}</span>
        <span style="font-size:11px;color:${sec?.accent||'#555'}">${count}×</span>
      </div>`;
    });
    el.appendChild(card);
  }
}

// ─── RIGHT COLUMN (TODAY) ─────────────────────────────────────────────────────
function updateRightColumn(pct, doneCount, total, remaining, todayTasks, key) {
  const offset = CIRC * (1 - pct / 100);
  const rc = pct===100?"#4ade80":pct>=70?"#a3e635":pct>=40?"#facc15":"#f87171";
  document.getElementById("ring-fill").style.strokeDashoffset = offset;
  document.getElementById("ring-fill").style.stroke = rc;
  document.getElementById("ring-pct").innerHTML = pct + '<span>%</span>';
  document.getElementById("ring-label").textContent = "COMPLETE";

  let msg, sub, color;
  if      (pct===100) { msg="All done.";        sub="Enjoy your day ✓";                                       color="#4ade80"; }
  else if (pct>=80)   { msg="Almost there.";    sub=remaining+" left to go";                                  color="#a3e635"; }
  else if (pct>=50)   { msg="Halfway through."; sub=remaining+" item"+(remaining!==1?"s":"")+" remaining";    color="#facc15"; }
  else if (pct>=25)   { msg="Getting going.";   sub=remaining+" task"+(remaining!==1?"s":"")+" ahead";        color="#fb923c"; }
  else                { msg="Fresh start.";     sub=remaining+" thing"+(remaining!==1?"s":"")+" on your list"; color="#f87171"; }
  document.getElementById("motivate-msg").textContent = msg;
  document.getElementById("motivate-msg").style.color = color;
  document.getElementById("motivate-sub").textContent = sub;

  document.getElementById("stat-done").textContent  = doneCount;
  document.getElementById("stat-total").textContent = total;
  document.getElementById("stat-left").textContent  = remaining;
  document.getElementById("stat-done").parentElement.querySelector(".stat-lbl").textContent  = "DONE";
  document.getElementById("stat-total").parentElement.querySelector(".stat-lbl").textContent = "TOTAL";
  document.getElementById("stat-left").parentElement.querySelector(".stat-lbl").textContent  = "LEFT";
  document.getElementById("stat-done").style.color  = "#4ade80";
  document.getElementById("stat-total").style.color = "#333";
  document.getElementById("stat-left").style.color  = remaining===0?"#4ade80":"#facc15";

  const barsEl = document.getElementById("sec-bars");
  barsEl.innerHTML = "";
  SECTIONS.forEach(sec => {
    const tasks = todayTasks.filter(t => t.section === sec.key);
    if (!tasks.length) return;
    const sd = tasks.filter(t => doneLog[t.id + "_" + key]).length;
    const sp = Math.round((sd / tasks.length) * 100);
    const bar = document.createElement("div");
    bar.className = "bar-row";
    bar.innerHTML = `<div class="bar-meta"><span class="bar-name">${sec.label.toUpperCase()}</span><span class="bar-count">${sd}/${tasks.length}</span></div><div class="bar-track"><div class="bar-fill" style="width:${sp}%;background:${sec.accent}"></div></div>`;
    barsEl.appendChild(bar);
  });
}

// ─── VIEW SWITCHING ───────────────────────────────────────────────────────────
function switchView(view) {
  currentView = view;
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.querySelector(`[onclick="switchView('${view}')"]`).classList.add("active");
  document.getElementById("view-today").style.display   = view === 'today'   ? 'block' : 'none';
  document.getElementById("view-week").style.display    = view === 'week'    ? 'block' : 'none';
  document.getElementById("view-history").style.display = view === 'history' ? 'block' : 'none';
  document.getElementById("edit-btn").style.display     = view === 'today'   ? 'block' : 'none';
  if (view === 'today')   render();
  if (view === 'week')    renderWeek();
  if (view === 'history') renderHistory();
}

function setRange(days, btn) {
  historyRangeDays = days;
  document.querySelectorAll(".range-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderHistory();
}

// ─── INTERACTIONS ─────────────────────────────────────────────────────────────
function toggleTask(id) {
  const key = id + "_" + todayKey;
  if (doneLog[key]) { delete doneLog[key]; }
  else { doneLog[key] = new Date().toISOString(); }
  saveDone(doneLog); render();
}
function toggleEdit() {
  editMode = !editMode;
  document.body.classList.toggle("edit-mode", editMode);
  document.getElementById("edit-btn").textContent = editMode ? "DONE" : "EDIT";
}
function onTypeChange() {
  const isOnce = document.getElementById("inp-type").value === "once";
  document.getElementById("inp-freq").style.display = isOnce ? "none" : "block";
  document.getElementById("inp-dow").style.display  = "none";
}
function onFreqChange() {
  document.getElementById("inp-dow").style.display = document.getElementById("inp-freq").value === "weekly" ? "block" : "none";
}
function addTask() {
  const name = document.getElementById("inp-name").value.trim();
  if (!name) return;
  const type = document.getElementById("inp-type").value;
  const isOnce = type === "once";
  const task = {
    id: "u_"+Date.now(), name,
    emoji:   document.getElementById("inp-emoji").value || "✅",
    freq:    isOnce ? "once" : document.getElementById("inp-freq").value,
    section: document.getElementById("inp-section").value,
    type,
  };
  if (!isOnce && task.freq === "weekly") task.dow = parseInt(document.getElementById("inp-dow").value);
  customTasks.push(task); saveCustom(customTasks);
  document.getElementById("inp-name").value = ""; render();
}
function removeTask(id, e) {
  e.stopPropagation();
  customTasks = customTasks.filter(t => t.id !== id); saveCustom(customTasks); render();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
try {
  const c = JSON.parse(localStorage.getItem("hd_sheet_cache") || "null");
  if (c && c.length) {
    sheetTasks = c;
    document.getElementById("loading-state").style.display = "none";
    const el = document.getElementById("sync-status");
    el.textContent = "UPDATING…"; el.className = "syncing";
    render();
  }
} catch(e) {}

try {
  const c = JSON.parse(localStorage.getItem("hd_history_cache") || "null");
  if (c) { permanentHistory = c.perm || {}; rawHistory = c.raw || []; }
} catch(e) {}

syncFromSheet();
fetchHistory();
setInterval(syncFromSheet, SYNC_MS);
setInterval(fetchHistory, SYNC_MS);
setInterval(checkMidnightCommit, 60000);
</script>
